default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: pipeline_hq_development
  host: localhost
  username: postgres
  password: postgres

test:
  <<: *default
  database: pipeline_hq_test
  host: localhost
  username: postgres
  password: postgres

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "pipeline_hq_production") %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_NAME", "pipeline_hq_production") %>_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_NAME", "pipeline_hq_production") %>_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_NAME", "pipeline_hq_production") %>_cable
    migrations_paths: db/cable_migrate
